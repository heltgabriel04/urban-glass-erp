name: Gerar keystore de assinatura Android (rodar uma única vez)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: "Alias da chave dentro do keystore"
        required: true
        default: "urbanglass-upload"

# Rodar esse workflow gera um keystore NOVO — se você já tem um em uso,
# rodar de novo cria uma identidade de assinatura diferente e invalida
# atualizações futuras assinadas com o keystore antigo. Rode só uma vez.

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Gerar senhas aleatórias
        id: pw
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -base64 24)
          KEY_PASSWORD=$(openssl rand -base64 24)
          echo "::add-mask::$KEYSTORE_PASSWORD"
          echo "::add-mask::$KEY_PASSWORD"
          echo "keystore_password=$KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_password=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Gerar keystore
        run: |
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ steps.pw.outputs.keystore_password }}" \
            -keypass "${{ steps.pw.outputs.key_password }}" \
            -dname "CN=Urban Glass ERP, OU=TI, O=Urban Glass, L=Brasil, ST=BR, C=BR"

      - name: Extrair fingerprint SHA-256 (vai pro assetlinks.json — não é segredo)
        run: |
          keytool -list -v \
            -keystore upload-keystore.jks \
            -alias "${{ inputs.key_alias }}" \
            -storepass "${{ steps.pw.outputs.keystore_password }}" \
            | grep "SHA256:" | tee sha256-fingerprint.txt

      - name: Montar arquivo com as credenciais (fica só no artifact, não no log)
        run: |
          cat > keystore-info.txt << EOF
          Alias:             ${{ inputs.key_alias }}
          Keystore password: ${{ steps.pw.outputs.keystore_password }}
          Key password:      ${{ steps.pw.outputs.key_password }}

          Guarde esse arquivo em local seguro (gerenciador de senhas). Ele NUNCA
          deve ser commitado no repositório. Depois de guardar, cadastre estes
          3 secrets no repo (Settings > Secrets and variables > Actions):
            ANDROID_KEYSTORE_BASE64  = conteúdo do upload-keystore.jks em base64
            ANDROID_KEYSTORE_PASSWORD = a senha "Keystore password" acima
            ANDROID_KEY_PASSWORD     = a senha "Key password" acima
            ANDROID_KEY_ALIAS        = ${{ inputs.key_alias }}

          O fingerprint SHA-256 (sha256-fingerprint.txt, incluso neste artifact)
          não é segredo — é o valor que vai em public/.well-known/assetlinks.json.
          EOF

      - name: Codificar keystore em base64 (facilita colar no secret)
        run: base64 -w0 upload-keystore.jks > upload-keystore.jks.base64

      - name: Upload do artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: |
            upload-keystore.jks
            upload-keystore.jks.base64
            keystore-info.txt
            sha256-fingerprint.txt
          retention-days: 7

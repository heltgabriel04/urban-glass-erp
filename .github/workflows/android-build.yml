name: Build Android

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm ci

      - name: Sincronizar projeto Android (Capacitor)
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Instalar pacotes do Android SDK
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Torna o gradlew executável
        run: chmod +x android/gradlew

      # "secrets" não pode ser usado direto em "if:" (restrição do GitHub Actions)
      # — passa primeiro por env: (onde secrets é permitido) e expõe um output,
      # que aí sim pode ser lido pelos "if:" dos steps de build abaixo.
      - name: Verifica se o keystore de assinatura já está configurado
        id: check_keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      # Enquanto os secrets de assinatura (ANDROID_KEYSTORE_BASE64 e cia, gerados
      # pelo workflow "generate-keystore") ainda não existem, builda um APK de
      # debug (assinado automaticamente pelo Gradle) só pra já ter algo instalável.
      # Depois de cadastrar os secrets, builda release assinado de verdade —
      # obrigatório pro Android App Links funcionar (o fingerprint tem que bater
      # com public/.well-known/assetlinks.json).
      - name: Build debug (sem keystore configurado ainda)
        if: steps.check_keystore.outputs.has_keystore == 'false'
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            -PbuildVersionCode=${{ github.run_number }} \
            -PbuildVersionName=1.0.${{ github.run_number }}

      - name: Build release assinado
        if: steps.check_keystore.outputs.has_keystore == 'true'
        working-directory: android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          # Tamanho é seguro de logar (não expõe conteúdo). Um keystore .jks
          # típico vira uns 3-6 mil caracteres em base64 — se aparecer bem
          # menor que isso, o valor colado no secret está incompleto/errado.
          echo "Tamanho do secret ANDROID_KEYSTORE_BASE64: ${#KEYSTORE_B64} caracteres"

          # Escreve num arquivo em vez de "echo | base64 -d" (evita qualquer
          # peculiaridade do echo/shell) e usa --ignore-garbage pra tolerar
          # espaço/quebra de linha que o copia-e-cola possa ter introduzido.
          KEYSTORE_PATH="$(pwd)/app/upload-keystore.jks"
          printf '%s' "$KEYSTORE_B64" > raw-keystore.b64
          base64 -d -i raw-keystore.b64 > "$KEYSTORE_PATH"
          rm raw-keystore.b64
          test -s "$KEYSTORE_PATH" || { echo "Keystore decodificado ficou vazio — confira o secret ANDROID_KEYSTORE_BASE64"; exit 1; }

          # Tamanho é seguro de logar. Se ANDROID_KEYSTORE_PASSWORD e
          # ANDROID_KEY_PASSWORD tiverem o mesmo tamanho pode ser coincidência,
          # mas se o conteúdo for idêntico é sinal de ter colado a senha errada
          # num dos dois secrets (são gerados aleatórios e diferentes).
          echo "Tamanho do secret ANDROID_KEYSTORE_PASSWORD: ${#KEYSTORE_PASSWORD} caracteres"
          echo "Tamanho do secret ANDROID_KEY_PASSWORD: ${#KEY_PASSWORD} caracteres"
          echo "Tamanho do secret ANDROID_KEY_ALIAS: ${#KEY_ALIAS} caracteres"
          if [ "$KEYSTORE_PASSWORD" = "$KEY_PASSWORD" ]; then
            echo "::warning::ANDROID_KEYSTORE_PASSWORD e ANDROID_KEY_PASSWORD estão idênticos — confira se não colou o mesmo valor nos dois secrets por engano"
          fi

          # Valida a chave antes do build completo (falha em segundos em vez de
          # só descobrir senha/alias errado depois de ~1m30 de gradle).
          keytool -list -alias "$KEY_ALIAS" -keystore "$KEYSTORE_PATH" \
            -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" > /dev/null \
            || { echo "::error::Não foi possível ler a chave '$KEY_ALIAS' do keystore com as senhas fornecidas — confira ANDROID_KEY_PASSWORD, ANDROID_KEYSTORE_PASSWORD e ANDROID_KEY_ALIAS em keystore-info.txt"; exit 1; }

          # android.injected.signing.store.file com caminho relativo é resolvido
          # de forma inconsistente pelo Gradle Daemon (às vezes contra o módulo,
          # às vezes contra o diretório interno do próprio daemon) — por isso
          # sempre absoluto aqui.
          ./gradlew assembleRelease \
            -PbuildVersionCode=${{ github.run_number }} \
            -PbuildVersionName=1.0.${{ github.run_number }} \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          rm "$KEYSTORE_PATH"

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: urban-glass-erp-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

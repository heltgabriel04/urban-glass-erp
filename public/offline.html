<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sem conexão · Urban Glass</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #0d0d14;
      color: #f5f5f7;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .wrap {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      padding: 24px;
    }
    .mark {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,.6);
    }
    h1 { font-size: 18px; margin: 0; }
    p { font-size: 14px; color: rgba(255,255,255,.5); margin: 0; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      background: #10b981;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark">UG</div>
    <h1>Sem conexão</h1>
    <p>Não foi possível carregar essa página. Verifique a internet/wifi e tente novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
